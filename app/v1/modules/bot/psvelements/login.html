<div class="row-fluid" id="Ne132">
  <div class="span12 align-center row-padding" id="Ne133">
    <div class="row-fluid">
      <div class="">
        <img src="./images/Vision_logo.png" />
      </div>
    </div>
  </div>
  <div class="row-fluid login-holder" id="Ne134">
    <div class="dot-formgroup" id="Company-Container" style="display: none">
      <label id="company" for="company" class="override-form-label"
        >Company</label
      >
      <input
        type="Text"
        id="company"
        class="dot-formcontrol"
        placeholder="Company"
      />
    </div>
    <div class="dot-formgroup" id="UserName-Container">
      <label id="labeluserName" for="userName" class="override-form-label"
        >User Name</label
      >
      <input
        type="Text"
        id="userName"
        class="dot-formcontrol"
        placeholder="Username"
      />
    </div>
    <div class="dot-formgroup" id="Password-Container">
      <label id="label_password" for="password" class="override-form-label"
        >Password</label
      >
      <input
        type="password"
        class="dot-formcontrol"
        id="password"
        placeholder="Password"
      />
    </div>
    <div class="dot-formgroup" id="Language-Container">
      <label id="language" for="language" class="override-form-label"
        >Language</label
      >
      <select
        class="dot-formcontrol"
        name="lang_dropdown"
        id="lang_dropdown"
        onchange="onChangeLanguage(this.value)"
      >
        <option value="en_GB">English (UK)</option>
        <option value="en_US" selected="selected">English (US)</option>
        <option value="en_AU">English (Australia)</option>
        <option value="nl_NL">Nederlands</option>
        <option value="de_DE">German (Deutsch)</option>
      </select>
    </div>
    <div class="row-fluid" id="LoginButton-Container">
      <div class="span12 row-padding" id="Ne115">
        <input
          class="mobile-btn-primary"
          type="button"
          id="loginBtn"
          value="Login"
          accesskey=""
          onclick="validateLogin()"
          title=""
        />
      </div>
    </div>
  </div>
  <div class="row-fluid" id="suite_info">
    <div
      class="span12 Version-Container align-center row-padding"
      id="Version-Copyright"
    >
      <span id="suite_Label_span" class="versionlabel">
        Productivity Suite: v13.1
      </span>
    </div>
  </div>
  <div class="row-fluid" id="Ne136">
    <div class="span12 Version-Container align-center row-padding">
      <span id="Version_Label_span" class="versionlabel"
        >Version 7.0 7.4.0.7063</span
      >
      <span id="Copyright_label_span" class="copyrightlabel"
        >Copyright © 2025 EPS US, LLC. dba Graphic Communications,<br />
        a division of CAI Software. All rights reserved.</span
      >
    </div>
  </div>
</div>
